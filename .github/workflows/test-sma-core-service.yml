name: SMA Core Service Tests

on:
  push:
    branches: [ main, develop, 'feature/**' ]
    paths:
      - 'sma-backend/sma-core-service/**'
      - 'sma-backend/.github/workflows/test-sma-core-service.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'sma-backend/sma-core-service/**'
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: sma-backend/sma-core-service

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Run Unit Tests with Coverage
      run: ./mvnw test jacoco:report -B -Dspring.profiles.active=test

    - name: Generate Test Report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: JUnit Test Results
        path: target/surefire-reports/*.xml
        reporter: java-junit
        fail-on-error: false

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/site/jacoco/

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: unit-tests
    
    defaults:
      run:
        working-directory: sma-backend/sma-core-service

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests -B

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sma-core-service-jar
        path: target/*.jar
